<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Identification Information</title>

    <style>
            body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color:white;

        }

        .basic_data_container {
           backdrop-filter: blur(20px);
            padding: 100px;
            padding-top:0px;
            padding-bottom:10px;
            border-radius: 10px;
            width: 300px;
            text-align: center;
        }



        label {
            display: block;
            margin-top: 10px;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            box-sizing: border-box;
            border: none;
            border-radius: 5px;
            background-color: #007BFF;
            color: white;
            cursor: pointer;
        }
        .background-image {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: url(static/basicbg.jpg);
            background-size: cover;
            background-position: center;
            z-index: -1;
        }


        nav{
            position: relative;
            left: 700px;
            top: 10px;
            list-style: none;

        }

        a:link{
            text-decoration: none;
        }

        nav li{
            color: white;
        }

       





    </style>
</head>
<body>



    <div class="background-image"></div>

    <div class="basic_data_container">
         <nav>
           <a href="basicland"> <li>Back</li> </a>
        </nav>

        <h2>Personal Details</h2>
        <br>
        <form action="" method="post" enctype="multipart/form-data">
                 {%csrf_token%}
    
            
                <label for="name">Name:</label>
                <input type="text" name="name1" placeholder="Enter a Name" required>
                
                <label for="age">Age : </label> 
                <input type="number" name="name2" placeholder="Enter a Age" required>

            

            
                <label for="phone">Phone :</label> 
                <input type="text" name="name3" placeholder="Enter a Phone number" required>
            

            
                <label for="email">Email:</label>
                <input type="email"  name="name4" placeholder="Enter a Email" required>



            
                <label for="gender">Gender:</label>
                <input type="radio"  name="gender" value="Male">Male
                <input type="radio" name="gender" value="Female">Female
        
                

                <label for="date">Date of Birth:</label>
                <input type="date" name="name5" placeholder="Enter a Date of Birth" required>
            
            
                <button type="submit">Submit</button>
        
        </form>
    </div>

    
</body>
</html>
