<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Educational Data</title>
    <style>
         body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color:white;

        }

        .education_container {


            border-radius: 10px;
            width: 300px;
            text-align: center;
             backdrop-filter: blur(20px);
            padding: 100px;
            padding-top:50px;
            padding-bottom:20px;
        }



        label {
            display: block;
            margin-top: 10px;
            text-align: left;
        }

        input ,select{
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            box-sizing: border-box;
            border: none;
            border-radius: 5px;
            background-color: #007BFF;
            color: white;
            cursor: pointer;
        }
        .background-image {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image:url(static/edubg.jpg);
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

          nav{
            position: relative;
            left: 700px;
            bottom:80px;
            list-style: none;

        }

        a:link{
            text-decoration: none;
        }

        nav li{
            color: white;
        }
    </style>
</head>
<body>
    <div class="background-image">


    </div>

    <div class="education_container">
         <nav>
           <a href="eduland"> <li>Back</li> </a>
        </nav>

        <h2>Education Data</h2>
        <form action="" method="post" enctype="multipart/form-data">
            {% csrf_token %}

            <label for="name">Name:</label>
            <input type="text" name="name1" placeholder="Enter a Name" required>

            <label for="school">Schools Attend:</label>
            <input type="text" name="name2" placeholder="Enter a Schools Attend" required>

            <label for="course">Course Taken:</label>
            <input type="text" name="name3" placeholder="Enter a Course" required>

            <label for="degree">Degree:</label>
            <input type="text" name="name4" placeholder="Enter a Degree" required>

            <label for="Resources">Learning Resources:</label>
        
            <select name="name5" required>
                <option value="Online Course">Online Course</option>
                <option value="Books">Books</option>
                <option value="Workshops">Workshops</option>

            </select>
            <br><br>

            <button type="submit">Save</button>





        </form>



    </div>
    
</body>
</html>
