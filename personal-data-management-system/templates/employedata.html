<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employe Data</title>
    <style>

body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color:white;

        }

        .employe_container {
            backdrop-filter: blur(20px);
            padding: 100px;
            padding-top:50px;
            padding-bottom:20px;
            border-radius: 10px;
            width: 300px;
            text-align: center;
        }





        label {
            display: block;
            margin-top: 10px;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            box-sizing: border-box;
            border: none;
            border-radius: 5px;
            background-color: #007BFF;
            color: white;
            cursor: pointer;
        }

          .background-img {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: url(static/employebg.jpg);
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

          nav{
            position: relative;
            left: 700px;
             bottom:60px;
            list-style: none;

        }

        a:link{
            text-decoration: none;
        }

        nav li{
            color: white;
        }

    </style>
</head>
<body>
    <div class="background-img"></div>

    <div class="employe_container">
         <nav>
           <a href="empland"> <li>Back</li> </a>
        </nav>
        <h2>Employee Details</h2>
        <br>

        <form action="" method="post" enctype="multipart/form-data">
             {%csrf_token%}

            <label for="name">Name:</label>
            <input type="text" name="name1" placeholder="Enter a name" required>

            <label for="id">Employee Id:</label>
            <input type="number" name="name2" placeholder="Enter Your Id" required>

            <label for="companyname">Company Name:</label>

            <input type="text" name="name3" placeholder="Enter your Companyname" required>

            <label for="filed">Field Name:</label>
            <input type="text" name="name4" placeholder="Enter your Role" required>

            <label for="experience">Experience:</label>
            <input type="text" name="name5" placeholder="Enter your Experience" required>

            <br>
            <br>

            <button type="submit">Save</button>



        </form>
    </div>

</body>
</html>
