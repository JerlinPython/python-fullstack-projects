<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    <link href="static/dishdiscoverygallerystyle.css" rel="stylesheet">
    <link  href="https://fonts.googleapis.com/css2?family=Alex+Brush&display=swap"  rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        body{
    margin: 0;
    padding: 0;
    background: url("static/template.jpg");
    background-repeat: no-repeat;
    background-size:cover;
    background-position: center;
    overflow-x: hidden;


}


.htext h1{
    font-family: 'Alex Brush',cursive;
    font-size: 50px;
    font-weight: 400px;

}

.htext{
    text-align: center;
}

.htext p{
    font-family:cursive;
    display: inline-block;
    border: 5px outset rgb(206, 199, 199);
    padding: 20px;
}

.h1{
    font-weight: 200;
}

.slider{
    height: 400px;
    width:600px;
    border: 2px solid black;
    background: url("static/slide1.jpg");
    background-repeat: no-repeat;
    background-position: center;
    background-size: cover;
    border-radius: 20px;
    position: relative;
    left: 450px;
    top: 20px;

}

.btn-left{
    position: absolute;
    top:50%;
    background-color: white;
    border-radius: 2px;
    padding: 3px;
    left:-2px;
    transform: translateY(-50%);
    cursor: pointer;

}

.btn-right{
    position: absolute;
    top:50%;
    background-color: white;
    border-radius: 2px;
    padding: 3px;
    right:-2px;
    transform: translateY(-50%);
    cursor: pointer;

}



.galleryvideo video{
    position: relative;
    left: 450px;
    top:20px;
    border-radius: 10px;
}

.galleryimg{
    display: flex;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    gap: 20px 30px;
    position: relative;
    top: 40px;

}

.galleryimg img{
    width: 200px;
    height: 200px;
    border: 2px solid rgb(125, 48, 48);
    border-radius: 13px;
    box-shadow: 4px 7px 7px 0px #00000042;
    transition: 400ms;
}

.galleryimg img:hover{
    transform: scale(1.05);
    cursor: pointer;
}

h1{
    text-align: center;
    margin-top: 100px;
    font-family: monospace;
    font-size: 40px;
    font-weight: 500px;
}

.end{
    text-align: center;
    margin-top: 80px;
    background:url("end.jpg") ;
    padding-top: 50px;
    font-family: monospace;
}

.end button{
    width: 300px;
    padding: 20px;
    background-color: rgb(189, 222, 250);
    font-size: 20px;
    font-family: monospace;
    transition: 400ms;
}

.end button:hover{
    transform: scale(1.04);
}
        a:link{
        text-decoration:none}
    </style>
</head>
<body>
    <div class="header">
        <div class="htext">
            <h1>Dish Discovery</h1>
            <p>Since 1997," Elevating Your Dining Experience "</p>
            <h1 class="h1">Gallery</h1>
            <hr>
        </div>
        <div class="slider">
            <div class="btns">
               <a class="btn btn-left"><i class="fa-solid fa-caret-left"></i></a>
               <a class="btn btn-right"><i class="fa-solid fa-caret-right"></i></a>

            </div>
        </div>

     <h1>Food Gallery</h1>

        <div class="galleryimg">


            <img src="static/gallery1.jpg" alt="img">
            
            <img src="static/gallery2.jpg" alt="img">

            <img src="static/gallery3.jpg" alt="img">

        
            <img src="static/gallery4.jpg" alt="img">

    
            <img src="static/gallery5.jpg" alt="img">

        
            <img src="static/gallery6.jpg" alt="img">

            <img src="static/gallery7.jpg" alt="img">

            <img src="static/gallery8.jpg" alt="img">

            <img src="static/gallery9.jpg" alt="img">

            <img src="static/gallery10.jpg" alt="img">

            <img src="static/gallery11.jpg" alt="img">

            <img src="static/gallery12.jpg" alt="img">

            
            <img src="static/gallery13.jpg" alt="img">
            
            <img src="static/gallery14.jpg" alt="img">

            <img src="static/gallery15.jpg" alt="img">

        
            <img src="static/gallery16.jpg" alt="img">

    
            <img src="static/gallery17.jpg" alt="img">

        
            <img src="static/gallery18.jpg" alt="img">

            <img src="static/gallery19.jpg" alt="img">

            <img src="static/gallery20.jpg" alt="img">

            <img src="static/gallery21.jpg" alt="img">

            <img src="static/gallery22.jpg" alt="img">

            <img src="static/gallery23.jpg" alt="img">

            <img src="static/gallery24.jpg" alt="img">



        </div>

    

        <div class="galleryvideo">
            <h1>Video</h1>

            <video  controls="" loop="" src="static/galleryvideo.mp4" width="600px">

            </video>
        </div>

        <div class="end">
            <h2><a href="http://127.0.0.1:8000/">Back to Home </a></h2>

            <button><a href="reserve">Make Reservation</a></button>
            <button><a href="login">Make a Order</a></button>

        </div>
    </div>

  <script src="static/dishdiscoverygallery.js"></script>
</body>
</html>
