<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

        body{
            margin: 0;
            padding: 0;
            background: url(static/successbg.jpg);
            background-repeat: no-repeat;
            background-size: cover;
        }
        .success{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-top: 150px;
            font-family: Arial, sans-serif;
            border: 2px solid white;
            padding: 20px;
            background-color: aliceblue;
            width: 600px;
            border-radius: 1em;
            margin-left: 450px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .success h4{
            font-size: 30px;

        }

        .success h6{
            font-size: 20px;
        }

        .shopping-btn{
            width: 200px;
            padding: 10px;
            background-color: red;
            color: aliceblue;
            border-radius: 10px;
            cursor: pointer;
        }

        .home-btn{
            width: 100px;
            padding: 10px;
            background-color: red;
            color: aliceblue;
            border-radius: 10px;
            cursor: pointer;
        }

        .shopping-btn:hover,.home-btn:hover{
            transform: scaleY(1.1);
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="success">
            <h4>Success! Thank You for your Order</h4>
            <h6>Your items will reach you at the earliest.</h6><br>
            <a href="{% url 'item' %}"><button type="submit" class="shopping-btn">Continue shopping</button></a>
            <br>
            <a href="http://127.0.0.1:8000/"><button type="submit" class="home-btn">Home</button></a>
        </div>
    </div>
</body>
</html>
