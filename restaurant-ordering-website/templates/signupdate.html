<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SignUp-Update</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<table>
    <form action="" method="post" enctype="multipart/form-data">
          {% csrf_token %}
        <tr>
            <th>Name</th>
            <td><input type="text" name="name1" value="{{sukey.Username}}"></td>
        </tr>

        <tr>
            <th>Email</th>
            <td><input type="email" name="name2" value="{{sukey.Email}}"></td>
        </tr>

        <tr>
            <th>Password</th>
            <td><input type="password" name="name3" value="{{sukey.Password}}"></td>
        </tr>

        <tr>
            <th>Phone</th>
            <td><input type="text" name="name4" value="{{sukey.Phone}}"></td>
        </tr>

        <tr>
            <th>Address</th>
            <td><input type="text" name="name5" value="{{sukey.Address}}"></td>
        </tr>

        <tr>

           <td align ="center" colspan="2">
               <br>
           <input type="submit" value="Register" class="btn btn-dark"></td>
        </tr>


    </form>
</table>

</body>
</html>
